name: 小智ESP32S3音乐固件编译
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 支持手动点击触发构建

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取仓库全部代码
      - name: 检出项目源码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true # 拉取子组件，避免依赖缺失

      # 2. 乐鑫官方CI容器，内置IDF v5.4，自动加载环境
      - name: IDF5.4 编译ESP32S3固件
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: ./
          command: |
            idf.py fullclean
            idf.py build

      # 3. 上传编译产物，可在Actions页面下载bin固件
      - name: 上传固件bin文件
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-esp32-music-esp32s3
          path: |
            build/*.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
