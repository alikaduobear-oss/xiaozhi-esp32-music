name: Build Xiaozhi ESP32S3 Music
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code & submodules
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Build with ESP-IDF v5.4 Docker CI Action
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.4
          target: esp32s3
          path: ./
          command: idf.py fullclean build

      - name: Upload firmware bins
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi-esp32-music-firmware
          path: |
            build/*.bin
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
