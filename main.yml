name: Build ESP32-S3 Xiaozhi Music Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_firmware:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.4   # ← 修改这里
    steps:
      - name: 拉取源码 + 完整更新子模块
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 校验关键文件
        run: |
          for f in "main/boards/bread-compact-wifi-lcd/config.json" \
                   "main/boards/bread-compact-wifi-lcd/config.h" \
                   "main/boards/bread-compact-wifi-lcd/bread-compact-wifi-lcd.cc" \
                   "CMakeLists.txt" \
                   "sdkconfig.defaults" \
                   "scripts/release.py"; do
            if [ ! -f "$f" ]; then
              echo "::error::缺少关键文件: $f"
              exit 1
            fi
          done

      - name: 验证 JSON 格式
        run: |
          python -c "import json; c=json.load(open('main/boards/bread-compact-wifi-lcd/config.json')); print('✅ builds 类型:', type(c['builds'])); print('✅ 第一个构建名:', c['builds'][0]['name'])"

      - name: 使用 release.py 构建固件
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          python scripts/release.py bread-compact-wifi-lcd

      - name: 收集并上传固件
        if: always()
        run: |
          mkdir -p output_bin
          cp build/merged-binary.bin output_bin/ 2>/dev/null || true
          cp build/bootloader/bootloader.bin output_bin/ 2>/dev/null || true
          cp build/partition-table.bin output_bin/ 2>/dev/null || true
          cp build/xiaozhi-esp32-music.bin output_bin/ 2>/dev/null || true
          ls -lh output_bin/

      - name: 上传固件包
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: xiaozhi-music-firmware
          path: output_bin
