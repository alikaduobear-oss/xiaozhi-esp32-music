name: Build and Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        board: [bread-compact-wifi-lcd]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup ESP-IDF
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.3
        target: esp32s3

    - name: Configure Board
      run: |
        echo "CONFIG_BOARD_TYPE_BREAD_COMPACT_WIFI_LCD=y" >> sdkconfig.defaults
        echo "CONFIG_LCD_ST7735_128X160=y" >> sdkconfig.defaults
        echo "CONFIG_SPIRAM=y" >> sdkconfig.defaults
        echo "CONFIG_SPIRAM_MODE_OCT=y" >> sdkconfig.defaults
        echo "CONFIG_SPIRAM_SPEED_80M=y" >> sdkconfig.defaults
        echo "CONFIG_AUDIO_I2S_METHOD_SIMPLEX=y" >> sdkconfig.defaults

    - name: Build Firmware
      run: |
        idf.py set-target esp32s3
        idf.py build

    - name: Merge Binary
      run: |
        python release.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ matrix.board }}
        path: |
          build/*.bin
          build/bootloader/*.bin
          build/partition_table/*.bin
          build/merged-binary.bin
          build/xiaozhi.bin
        retention-days: 30

    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/merged-binary.bin
          build/xiaozhi.bin
          build/bootloader/bootloader.bin
          build/partition_table/partition-table.bin
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
