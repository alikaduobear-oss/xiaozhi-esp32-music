name: ESP32S3 Build
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    steps:
      # 拉取项目代码
      - name: Checkout source code
        uses: actions/checkout@v4

      # 一键安装并加载 ESP-IDF 5.4 环境（自动导出PATH，全局可用idf.py）
      - name: Setup ESP-IDF v5.4
        uses: espressif/setup-espressif-idf@v1
        with:
          idf-version: "5.4"
          # 缓存工具链加速下次编译
          cache-components: true
          cache-tools: true

      # 设置芯片目标 esp32s3
      - name: Set target chip ESP32S3
        run: idf.py set-target esp32s3

      # 清空旧缓存 + 拉取组件依赖 + 编译固件
      - name: Clean & Build Firmware
        run: |
          idf.py fullclean
          idf.py build

      # 可选：上传编译生成的bin固件到产物
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32s3-firmware-bin
          path: build/*.bin
